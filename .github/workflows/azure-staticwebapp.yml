name: Azure Static Web Apps CI/CD

on:
  push:
    branches: [ main ]
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build_and_deploy:
    runs-on: ubuntu-latest
    env:
      # Defaults can be overridden in repository or environment secrets/variables
      ASSET_URL: 'http://127.0.0.1:8080'
      SOCKET_URL: 'ws://127.0.0.1:2096'
      REACT_APP_ASSET_URL: ${{ env.ASSET_URL }}
      LOCALE: 'en_US'
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install envsubst (gettext)
        run: sudo apt-get update && sudo apt-get install -y gettext-base

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: |
            nitro/nitro-react/node_modules
            nitro/nitro-converter/node_modules
          key: ${{ runner.os }}-yarn-${{ hashFiles('**/yarn.lock') }}
          restore-keys: |
            ${{ runner.os }}-yarn-

      - name: Install dependencies & build nitro-react
        working-directory: ./nitro
        run: |
          # Install dependencies for both converter and react app
          yarn install --frozen-lockfile

          # Substitute runtime variables into template files if present
          if [ -f configuration/nitro-react/public/renderer-config.tpl.json ]; then
            envsubst < configuration/nitro-react/public/renderer-config.tpl.json > nitro-react/public/renderer-config.json
          fi
          if [ -f configuration/nitro-react/public/ui-config.tpl.json ]; then
            envsubst < configuration/nitro-react/public/ui-config.tpl.json > nitro-react/public/ui-config.json
          fi

          # Copy locale files (if any) to the public folder so they become part of the static build
          if [ -d configuration/nitro-react/public/locales ]; then
            rm -rf nitro-react/public/locales || true
            cp -R configuration/nitro-react/public/locales nitro-react/public/
          fi

          # Build the nitro-react app
          cd nitro-react
          yarn build

      - name: Deploy to Azure Static Web Apps
        uses: Azure/static-web-apps-deploy@v1
        with:
          azure_static_web_apps_api_token: ${{ secrets.AZURE_STATIC_WEB_APPS_API_TOKEN }}
          repo_token: ${{ secrets.GITHUB_TOKEN }} # Used for GitHub integrations (required)
          action: 'upload'
          app_location: 'nitro/nitro-react'
          api_location: ''
          output_location: 'nitro/nitro-react/build'

      - name: Upload build artifact (optional)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nitro-react-build
          path: nitro/nitro-react/build
